<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>방 만들기 — FRONTIER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#2C2C2E; --panel:#3A3A3C; --panel2:#48484A; --border:#555558;
  --gold:#F5C842; --gold2:#E5B832;
  --text:#F2F2F7; --muted:#AEAEB2;
  --red:#FF453A; --green:#30D158; --blue:#0A84FF; --orange:#FF9500;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}
body{background:radial-gradient(ellipse at top,#3a3a3c 0%,#2c2c2e 50%,#1c1c1e 100%);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}

.wrap{max-width:1200px;margin:0 auto;padding:18px 16px 60px}

.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.title{display:flex;align-items:baseline;gap:12px}
.logo{font-family:'Cinzel',serif;font-weight:800;font-size:22px;letter-spacing:3px;color:var(--gold)}
.tag{color:var(--muted);font-size:13px}
.back{color:var(--text);text-decoration:none;background:var(--panel2);padding:8px 14px;border-radius:8px;font-size:14px;border:1px solid var(--border)}
.back:hover{background:var(--panel)}

.cols{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:14px}
@media (max-width:920px){.cols{grid-template-columns:1fr}}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
.card h3{font-size:15px;margin-bottom:14px;color:var(--gold);letter-spacing:.5px}

/* 방 코드 */
.code-box{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(245,200,66,.05));
  border:1px dashed var(--gold);border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;cursor:pointer;transition:all .15s}
.code-box:hover{background:rgba(245,200,66,.18)}
.code-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.code-val{font-family:'Cinzel',monospace;font-size:30px;font-weight:800;color:var(--gold);letter-spacing:5px}
.code-hint{font-size:11px;color:var(--muted);margin-top:4px}

.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px}
.field input,.field textarea{
  width:100%;padding:10px 12px;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:none;min-height:60px}

/* 기물 카운터 */
.piece{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.piece .sym{font-size:24px;width:32px;text-align:center;line-height:1;color:var(--text)}
.piece .info{flex:1;min-width:0}
.piece .pname{font-weight:700;font-size:13px}
.piece .pdesc{font-size:11px;color:var(--muted);line-height:1.3}
.piece .ctl{display:flex;align-items:center;gap:6px}
.cbtn{width:30px;height:30px;border-radius:6px;background:var(--panel);border:1px solid var(--border);
  color:var(--text);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cbtn:hover:not(:disabled){background:var(--gold);color:#1c1c1e;border-color:var(--gold)}
.cbtn:disabled{opacity:.3;cursor:not-allowed}
.cnum{min-width:24px;text-align:center;font-weight:800;font-size:15px}

.divider{height:1px;background:var(--border);margin:12px 0}
.subtitle{font-size:12px;color:var(--muted);letter-spacing:.5px;margin-bottom:8px;font-weight:600;text-transform:uppercase}

/* 시간제한 */
.times{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.tbtn{padding:10px 4px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer}
.tbtn.on{background:var(--gold);color:#1c1c1e;border-color:var(--gold)}
.tbtn:hover:not(.on){background:var(--panel)}

.btn{padding:12px 20px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:inherit;width:100%}
.btn-gold{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1c1c1e;font-size:16px;padding:14px}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,200,66,.3)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}

/* 대기 화면 */
.wait{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;z-index:200;padding:20px}
.wait.show{display:flex}
.wait-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:30px;text-align:center;max-width:420px}
.wait-spin{width:60px;height:60px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-code{font-family:'Cinzel',monospace;font-size:34px;font-weight:800;color:var(--gold);letter-spacing:6px;margin:8px 0 14px}
.wait-msg{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.5}
.wait-actions{display:flex;gap:8px}
.wait-actions .btn{font-size:13px;padding:10px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);
  border:1px solid var(--gold);padding:10px 18px;border-radius:8px;font-size:13px;display:none;z-index:300}
.toast.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="title">
      <div class="logo">FRONTIER</div>
      <div class="tag">방 만들기</div>
    </div>
    <a href="index.html" class="back">← 로비</a>
  </div>

  <div class="cols">
    <!-- 왼쪽: 방 정보 -->
    <div class="card">
      <h3>방 정보</h3>
      <div class="code-box" onclick="copyCode()">
        <div class="code-label">방 코드 (클릭 복사)</div>
        <div class="code-val" id="codeVal">------</div>
        <div class="code-hint" id="codeHint">친구에게 공유하세요</div>
      </div>
      <div class="field">
        <label>방 이름 (선택)</label>
        <input type="text" id="roomName" placeholder="예: 가볍게 한판" maxlength="30">
      </div>
      <div class="field">
        <label>비밀번호 (선택)</label>
        <input type="text" id="roomPw" placeholder="비워두면 누구나 입장 가능" maxlength="20">
      </div>
      <div class="field">
        <label>방 설명 (선택, 60자)</label>
        <textarea id="roomDesc" placeholder="" maxlength="60"></textarea>
      </div>
    </div>

    <!-- 가운데: 기물 설정 -->
    <div class="card">
      <h3>기물 구성</h3>
      <div class="subtitle">일반 기물</div>
      <div id="normalPieces"></div>
      <div class="divider"></div>
      <div class="subtitle">특수 기물</div>
      <div id="specialPieces"></div>
    </div>

    <!-- 오른쪽: 시간 + 만들기 -->
    <div class="card">
      <h3>시간 제한</h3>
      <div class="times" id="times"></div>
      <h3 style="margin-top:14px">증분 (수당 추가 시간)</h3>
      <div class="times" id="incs"></div>
      
      <!-- 물약 모드 -->
      <h3 style="margin-top:14px">🧪 물약 모드</h3>
      <label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" id="potionMode" style="width:18px;height:18px;accent-color:#bf5af2">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">물약 모드 활성화</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">매 턴 랜덤 물약 1개 + 1P 획득. 부활/차단/조커/시간/엿보기 5종.</div>
        </div>
      </label>

      <!-- 농민 봉기 모드 -->
      <h3 style="margin-top:14px">🔥 농민 봉기</h3>
      <label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" id="peasantMode" style="width:18px;height:18px;accent-color:#a0522d">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">농민 봉기 활성화</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">민심 게이지 50% 이상이면 봉기! 킹 2칸 이동·폰의 킹 사냥(→회색 킹)·퀸의 아군 폰 처치.</div>
        </div>
      </label>

      <!-- 타이쿤 모드 -->
      <h3 style="margin-top:14px">💰 타이쿤</h3>
      <label style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" id="tycoonMode" style="width:18px;height:18px;accent-color:#f5c842">
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">타이쿤 활성화</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">매 턴 +5G로 기물 구매·턴 스킵·스나이퍼 강화·폰 승급. 50G 선점 또는 오목/체크메이트로 승리. (킹만 기본 지급)</div>
        </div>
      </label>

      <div class="subtitle" style="margin-top:8px">현재 설정 요약</div>
      <div style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:18px" id="summary"></div>
      <button class="btn btn-gold" onclick="createRoom()" id="createBtn">방 만들기</button>
    </div>
  </div>
</div>

<!-- 대기 화면 -->
<div class="wait" id="waitOverlay">
  <div class="wait-card">
    <div class="wait-spin"></div>
    <div style="font-size:13px;color:var(--muted)">방 코드</div>
    <div class="wait-code" id="waitCode">------</div>
    <div class="wait-msg">상대 입장을 기다리는 중…<br>30분 동안 입장이 없으면 방이 자동 취소됩니다.</div>
    <div class="wait-actions">
      <button class="btn btn-ghost" onclick="copyWaitCode()">코드 복사</button>
      <button class="btn btn-ghost" onclick="cancelRoom()" style="color:var(--red)">방 취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============== Firebase ===============
const FB_CONFIG = {
  apiKey: "AIzaSyD_bv9vLqcMDMZgGHNLS2A94INXqkO8XX8",
  authDomain: "ooooomok-285e6.firebaseapp.com",
  databaseURL: "https://ooooomok-285e6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ooooomok-285e6",
  storageBucket: "ooooomok-285e6.firebasestorage.app",
  messagingSenderId: "764275385569",
  appId: "1:764275385569:web:44cecc18de9aef4d9a43a0"
};
let _fbDb=null, _fbAuth=null;
function fbInit(){
  const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(FB_CONFIG);
  _fbDb = firebase.database();
  _fbAuth = firebase.auth();
}
fbInit();

// =============== URL params ===============
const Q = new URLSearchParams(location.search);
const MY_UID = Q.get('uid');
const MY_NICK = Q.get('nick') || '익명';
const MY_TAG = Q.get('tag') || '';
const MY_ELO = parseInt(Q.get('elo')||'1200');
const MY_TITLE_NAME = Q.get('title') || '';
const MY_TITLE_COLOR = Q.get('titleColor') || '';

// =============== 방 코드 ===============
function genCode(){
  const ch = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s += ch[Math.floor(Math.random()*ch.length)];
  return s;
}
// 친구 대전에서 미리 정한 코드 사용 (sessionStorage)
let _presetCode = null, _isFriendBattle = false;
try {
  _presetCode = sessionStorage.getItem('preset_room_code');
  _isFriendBattle = sessionStorage.getItem('preset_room_private') === '1';
  if(_presetCode){
    // 한 번 쓰고 즉시 제거
    sessionStorage.removeItem('preset_room_code');
    sessionStorage.removeItem('preset_room_private');
  }
} catch(_){}
let MY_CODE = _presetCode || genCode();
document.getElementById('codeVal').textContent = MY_CODE;
if(_isFriendBattle){
  // 친구 대전 모드 표시
  document.getElementById('codeHint').innerHTML = '<span style="color:#bf5af2">👥 친구 대전 — 초대 전송됨</span>';
}

function copyCode(){
  navigator.clipboard.writeText(MY_CODE).then(()=>showToast('코드 복사됨: '+MY_CODE));
}
function copyWaitCode(){
  navigator.clipboard.writeText(MY_CODE).then(()=>showToast('코드 복사됨: '+MY_CODE));
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// =============== 기물 구성 ===============
const PIECE_DEFS = {
  Q:{sym:'♕',name:'퀸',desc:'8방향 직선 이동',def:1,max:2},
  R:{sym:'♖',name:'룩',desc:'4방향 직선 이동',def:2,max:4},
  B:{sym:'♗',name:'비숍',desc:'대각선 이동',def:2,max:4},
  N:{sym:'♘',name:'나이트',desc:'L자 점프',def:2,max:4},
  P:{sym:'♙',name:'폰',desc:'1칸 전진, 대각 공격',def:8,max:8},
  SH:{sym:'⬢',name:'방패',desc:'앞/뒤 1칸, 기물 밀기 가능',def:0,max:2},
  SN:{sym:'⊕',name:'스나이퍼',desc:'4꼭짓점 배치, 8방향 1-4칸 저격',def:0,max:1},
  JP:{sym:'✦',name:'어쌔신',desc:'상하좌우 2칸 점프',def:0,max:2}
};
const PIECE_ORDER = ['Q','R','B','N','P','SH','SN','JP'];
const NORMAL_KEYS = ['Q','R','B','N','P'];
const SPEC_KEYS = ['SH','SN','JP'];

let counts = {K:1};
PIECE_ORDER.forEach(k=> counts[k] = PIECE_DEFS[k].def);

function renderPieces(){
  const np = document.getElementById('normalPieces');
  const sp = document.getElementById('specialPieces');
  np.innerHTML = NORMAL_KEYS.map(renderRow).join('');
  sp.innerHTML = SPEC_KEYS.map(renderRow).join('');
  updateSummary();
}
function renderRow(k){
  const d = PIECE_DEFS[k];
  const c = counts[k];
  return `
  <div class="piece">
    <div class="sym">${d.sym}</div>
    <div class="info">
      <div class="pname">${d.name}</div>
      <div class="pdesc">${d.desc}</div>
    </div>
    <div class="ctl">
      <button class="cbtn" onclick="adj('${k}',-1)" ${c<=0?'disabled':''}>−</button>
      <span class="cnum">${c}</span>
      <button class="cbtn" onclick="adj('${k}',1)" ${c>=d.max?'disabled':''}>+</button>
    </div>
  </div>`;
}
function adj(k, delta){
  const d = PIECE_DEFS[k];
  counts[k] = Math.max(0, Math.min(d.max, counts[k]+delta));
  renderPieces();
}

// =============== 시간 제한 ===============
const TIME_OPTS = [
  {v:'30',l:'30초'},{v:'60',l:'1분'},{v:'300',l:'5분'},
  {v:'600',l:'10분'},{v:'1800',l:'30분'},{v:'3600',l:'1시간'},
  {v:'unlimited',l:'제한없음'}
];
let SEL_TIME = '300';
function renderTimes(){
  document.getElementById('times').innerHTML = TIME_OPTS.map(o=>
    `<button class="tbtn ${o.v===SEL_TIME?'on':''}" onclick="setTime('${o.v}')">${o.l}</button>`
  ).join('');
}
function setTime(v){ SEL_TIME = v; renderTimes(); updateSummary(); }

// =============== 증분 ===============
const INC_OPTS = [
  {v:'0',l:'없음'},{v:'1',l:'1초'},{v:'3',l:'3초'},{v:'5',l:'5초'},{v:'10',l:'10초'}
];
let SEL_INC = '0';
function renderIncs(){
  document.getElementById('incs').innerHTML = INC_OPTS.map(o=>
    `<button class="tbtn ${o.v===SEL_INC?'on':''}" onclick="setInc('${o.v}')">${o.l}</button>`
  ).join('');
}
function setInc(v){ SEL_INC = v; renderIncs(); updateSummary(); }

function updateSummary(){
  const total = Object.values(counts).reduce((a,b)=>a+b, 0);
  const tlabel = TIME_OPTS.find(o=>o.v===SEL_TIME)?.l || '5분';
  const ilabel = INC_OPTS.find(o=>o.v===SEL_INC)?.l || '없음';
  document.getElementById('summary').innerHTML = `
    총 기물 수: <b style="color:var(--gold)">${total}</b><br>
    총 시간: <b style="color:var(--gold)">${tlabel}</b><br>
    수당 증분: <b style="color:var(--gold)">${ilabel}</b><br>
    배치 영역: 6×4 (b~g, 3~6행)`;
}

// =============== 방 생성 ===============
function buildHandStr(){
  return PIECE_ORDER.reduce((s,k)=> s + k + counts[k], 'K1');
}

let _waitTimer = null;
let _roomWatcher = null;

async function createRoom(){
  if(!MY_UID){ alert('로그인이 필요합니다.'); return; }
  document.getElementById('createBtn').disabled = true;

  // 같은 호스트 UID로 만들어진 옛 방들이 유령으로 남아 있으면 정리
  try {
    const allSnap = await _fbDb.ref('rooms').once('value');
    const all = allSnap.val() || {};
    const cleanups = [];
    for(const [code, room] of Object.entries(all)){
      if(room.hostUid === MY_UID && code !== MY_CODE){
        cleanups.push(_fbDb.ref('rooms/'+code).remove().catch(()=>{}));
      }
    }
    if(cleanups.length){
      await Promise.all(cleanups);
      console.log(`[방 생성] 같은 UID의 유령방 ${cleanups.length}개 정리`);
    }
  } catch(e){ console.warn('유령방 정리 중 오류 (무시 가능):', e); }

  const data = {
    name: document.getElementById('roomName').value.trim() || '',
    desc: document.getElementById('roomDesc').value.trim() || '',
    password: document.getElementById('roomPw').value.trim() || '',
    hand: buildHandStr(),
    potion: document.getElementById('potionMode').checked,
    peasant: document.getElementById('peasantMode').checked,
    tycoon: document.getElementById('tycoonMode').checked,
    timeLimit: SEL_TIME,
    timeInc: SEL_INC,
    createdAt: Date.now(),
    lastActivity: Date.now(),
    started: false,
    gameActive: false,
    hostUid: MY_UID,
    hostNick: MY_NICK,
    hostTag: MY_TAG,
    hostElo: MY_ELO
  };
  try{
    await _fbDb.ref('rooms/'+MY_CODE).set(data);
    // 호스트 연결이 끊기면 방 자동 삭제 (유령방 방지)
    _fbDb.ref('rooms/'+MY_CODE).onDisconnect().remove();
  }catch(e){
    alert('방 생성 실패: '+e.message);
    document.getElementById('createBtn').disabled = false;
    return;
  }
  document.getElementById('waitCode').textContent = MY_CODE;
  document.getElementById('waitOverlay').classList.add('show');

  // 30분 후 자동 취소
  _waitTimer = setTimeout(()=>{ cancelRoom(true); }, 30*60*1000);

  // 게스트 입장 감지
  _roomWatcher = _fbDb.ref('rooms/'+MY_CODE).on('value', snap=>{
    const r = snap.val();
    if(!r) return;
    if(r.guestUid && !r.started){
      // 게스트 입장 완료 → started로 마크하고 게임 시작
      _fbDb.ref('rooms/'+MY_CODE).update({started:true, gameActive:true}).then(()=>{
        // 페이지 떠나기 전 myRoomCode 보호 (이건 게임 페이지 이슈, 여기선 단순 이동)
        const params = new URLSearchParams({
          role:'host', room:MY_CODE, time:SEL_TIME, inc:SEL_INC,
          uid:MY_UID, nick:MY_NICK, tag:MY_TAG, elo:MY_ELO,
          hand:data.hand
        });
        if(data.potion) params.set('potion','1');
        if(data.peasant) params.set('peasant','1');
        if(data.tycoon) params.set('tycoon','1');
        if(MY_TITLE_NAME) params.set('title', MY_TITLE_NAME);
        if(MY_TITLE_COLOR) params.set('titleColor', MY_TITLE_COLOR);
        // 즉시 이동
        location.href = 'FRONTIER.html?'+params.toString();
      });
    }
  });
}

async function cancelRoom(silent){
  if(_waitTimer){ clearTimeout(_waitTimer); _waitTimer=null; }
  if(_roomWatcher){ _fbDb.ref('rooms/'+MY_CODE).off(); _roomWatcher=null; }
  try{ await _fbDb.ref('rooms/'+MY_CODE).remove(); }catch(e){}
  document.getElementById('waitOverlay').classList.remove('show');
  document.getElementById('createBtn').disabled = false;
  if(!silent) showToast('방이 취소되었습니다.');
  else showToast('30분 경과로 방이 자동 취소되었습니다.');
}

// 페이지 떠날 때 정리
window.addEventListener('beforeunload', ()=>{
  if(_roomWatcher){
    // 호스트가 아직 게임에 진입 안 한 상태면 방 삭제
    _fbDb.ref('rooms/'+MY_CODE).once('value').then(snap=>{
      const r = snap.val();
      if(r && !r.started){ _fbDb.ref('rooms/'+MY_CODE).remove(); }
    });
  }
});

// =============== 초기화 ===============
renderPieces();
renderTimes();
renderIncs();
updateSummary();

// URL에 potion=1이면 자동 체크
if(Q.get('potion') === '1'){
  const cb = document.getElementById('potionMode');
  if(cb) cb.checked = true;
}
// URL에 peasant=1이면 자동 체크
if(Q.get('peasant') === '1'){
  const cb = document.getElementById('peasantMode');
  if(cb) cb.checked = true;
}
// URL에 tycoon=1이면 자동 체크
if(Q.get('tycoon') === '1'){
  const cb = document.getElementById('tycoonMode');
  if(cb) cb.checked = true;
}
</script>
