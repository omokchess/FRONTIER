name: Deploy Python AI Worker
on:
  push:
    branches: [main]
    paths:
      - 'frontier_ai/**'
      - 'models/**'
      - 'worker.py'
      - 'wrangler.jsonc'
      - 'cloudflare/**'
      - 'pyproject.toml'
      - 'package.json'
      - 'requirements-worker.txt'
      - '.github/workflows/deploy-ai-worker.yml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: pip install uv
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uvx --from workers-py --with "rich==13.4.2" pywrangler deploy
